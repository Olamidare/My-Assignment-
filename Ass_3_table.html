<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        /* Header */
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Content */
        .content {
            padding: 20px;
        }

        /* Footer */
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header">
        <h1>Student Records</h1>
    </div>

    <!-- Content Section -->
    <div class="content">
        <h2>List of Students</h2>

        <table>
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Score</th>
            </tr>
            <tr>
                <td>Dare</td>
                <td>Computer Science</td>
                <td>85</td>
            </tr>
            <tr>
                <td>John</td>
                <td>Mathematics</td>
                <td>78</td>
            </tr>
            <tr>
                <td>Aisha</td>
                <td>Physics</td>
                <td>92</td>
            </tr>
        </table>
    </div>

    <!-- Footer Section -->
    <div class="footer">
        <p>© 2026 Student Record System</p>
    </div>

</body>
</html>
